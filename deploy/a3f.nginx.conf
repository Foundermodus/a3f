# /etc/nginx/sites-available/a3f.conf
# Adjust server_name + certificate paths.

server {
    listen 80;
    listen [::]:80;
    server_name a3f.albumyoo.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name a3f.albumyoo.example.com;

    ssl_certificate     /etc/letsencrypt/live/a3f.albumyoo.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/a3f.albumyoo.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Limit upload size (matches UPLOAD_MAX_BYTES in backend)
    client_max_body_size 12m;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(self)" always;

    # Backend API + uploads
    location / {
        proxy_pass http://127.0.0.1:3300;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Long-cache uploaded photos
    location /uploads/ {
        proxy_pass http://127.0.0.1:3300;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }
}
