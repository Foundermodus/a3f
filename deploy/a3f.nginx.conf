# /etc/nginx/sites-available/a3f.conf
# Adjust server_name + certificate paths.

# Rate limiting zones (declare in http {} or include here for site-only)
limit_req_zone $binary_remote_addr zone=a3f_submit:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=a3f_read:10m   rate=240r/m;

server {
    listen 80;
    listen [::]:80;
    server_name a3f.albumyoo.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name a3f.albumyoo.example.com;

    ssl_certificate     /etc/letsencrypt/live/a3f.albumyoo.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/a3f.albumyoo.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    client_max_body_size 12m;
    client_body_timeout  20s;
    client_header_timeout 10s;
    keepalive_timeout    30s;
    server_tokens off;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Cross-Origin-Resource-Policy "cross-origin" always;

    # Static photos (long cache, no proxy buffering)
    location /uploads/ {
        limit_req zone=a3f_read burst=60 nodelay;
        proxy_pass http://127.0.0.1:3301;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # Submit (stricter limit)
    location = /api/submit {
        limit_req zone=a3f_submit burst=5 nodelay;
        limit_except POST OPTIONS { deny all; }
        proxy_pass http://127.0.0.1:3301;
        include /etc/nginx/proxy_params;
        proxy_request_buffering off;
        proxy_read_timeout 30s;
    }

    # Everything else (API + health)
    location / {
        limit_req zone=a3f_read burst=40 nodelay;
        proxy_pass http://127.0.0.1:3301;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Block dotfiles, common probe paths
    location ~ /\. { deny all; }
    location ~* /(\.env|\.git|wp-admin|wp-login)(/|$) { deny all; }
}
