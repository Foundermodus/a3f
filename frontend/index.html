<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>A3F — Sticker Directory</title>
  <link rel="stylesheet" href="./style.css" />
  <link rel="manifest" href="./manifest.json" />
</head>
<body>
  <header class="hero">
    <h1>A3F Sticker Directory</h1>
    <p class="muted">Foto vom Sticker hochladen — alle sehen alle.</p>
    <button id="share-page" class="ghost" type="button">QR-Code anzeigen</button>
  </header>

  <main>
    <section class="card">
      <h2>Mitmachen</h2>
      <form id="submit-form" enctype="multipart/form-data">
        <label>Name <input name="name" required maxlength="80" /></label>
        <label>Foto deines Stickers <input name="photo" type="file" accept="image/*" capture="environment" required /></label>
        <button type="submit">Eintragen</button>
        <p id="form-msg" class="muted" aria-live="polite"></p>
      </form>
    </section>

    <section class="card">
      <div class="row">
        <h2>Teilnehmer</h2>
        <div class="controls">
          <input id="filter" placeholder="Name suchen…" />
          <select id="sort">
            <option value="">Neueste zuerst</option>
            <option value="name">Nach Name</option>
          </select>
        </div>
      </div>
      <div id="grid" class="grid"></div>
      <p id="list-msg" class="muted"></p>
    </section>
  </main>

  <dialog id="share-dialog">
    <h3>Diesen QR-Code teilen / drucken</h3>
    <canvas id="page-qr" width="260" height="260"></canvas>
    <p id="share-dialog-url" class="muted"></p>
    <div class="share-row">
      <a id="page-wa" target="_blank" rel="noopener">WhatsApp</a>
      <a id="page-tg" target="_blank" rel="noopener">Telegram</a>
      <a id="page-mail">Mail</a>
      <button data-share="page-copy" type="button">Link kopieren</button>
      <button value="cancel" formmethod="dialog">Schliessen</button>
    </div>
  </dialog>

  <footer class="muted">
    <span id="stats"></span>
  </footer>

  <script src="./config.js"></script>
  <script src="./vendor/qrcode.min.js"></script>
  <script src="./qr.js"></script>
  <script src="./app.js" type="module"></script>
</body>
</html>
